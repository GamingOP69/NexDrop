services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexdrop
      POSTGRES_PASSWORD: nexdrop-secret
      POSTGRES_DB: nexdrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build: .
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    volumes:
      - ./storage:/app/storage

volumes:
  pgdata:
  redisdata:
